apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: simple-ingress
  namespace: {{ .Values.namespace }}
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /resources
            pathType: Prefix
            backend:
              service:
                name: resource-service
                port:
                  number: 8090
          - path: /songs
            pathType: Prefix
            backend:
              service:
                name: song-service
                port:
                  number: 8091