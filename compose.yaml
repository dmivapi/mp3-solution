services:
  resource-db:
    extends:
      file: common.yaml
      service: postgres-base
    environment:
      POSTGRES_DB: ${RESOURCE_DB}
      POSTGRES_USER: ${RESOURCE_DB_USER}
      POSTGRES_PASSWORD: ${RESOURCE_DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - ./init-scripts/resource-db:/docker-entrypoint-initdb.d:ro

  song-db:
    extends:
      file: common.yaml
      service: postgres-base
    environment:
      POSTGRES_DB: ${SONG_DB}
      POSTGRES_USER: ${SONG_DB_USER}
      POSTGRES_PASSWORD: ${SONG_DB_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - ./init-scripts/song-db:/docker-entrypoint-initdb.d:ro

  resource-service:
    depends_on:
      resource-db:
        condition: service_healthy
      song-service:
        condition: service_healthy
    build:
      context: .
      dockerfile: resource-service/Dockerfile
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://resource-db:5432/${RESOURCE_DB}
      SPRING_DATASOURCE_USER: ${RESOURCE_DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${RESOURCE_DB_PASSWORD}
      SONG_SERVICE_URL: http://song-service:8091
      EUREKA_DEFAULT_ZONE: http://eureka-server:8761/eureka/
    ports:
      - "8090:8090"

  song-service:
    depends_on:
      song-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8091/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    build:
      context: .
      dockerfile: song-service/Dockerfile
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://song-db:5432/${SONG_DB}
      SPRING_DATASOURCE_USER: ${SONG_DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${SONG_DB_PASSWORD}
      EUREKA_DEFAULT_ZONE: http://eureka-server:8761/eureka/
    ports:
      - "8091:8091"

  eureka-server:
    build:
      context: .
      dockerfile: eureka-server/Dockerfile
    environment:
      EUREKA_INSTANCE_HOSTNAME: eureka-server
    ports:
      - "8761:8761"