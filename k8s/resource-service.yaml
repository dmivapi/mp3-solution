apiVersion: v1
kind: Service
metadata:
  name: resource-service
  namespace: k8s-program
spec:
  type: NodePort
  selector:
    app: resource-service
  ports:
    - port: 8090
      targetPort: 8090
      nodePort: 30090
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: resource-service
  namespace: k8s-program
spec:
  replicas: 2
  selector:
    matchLabels:
      app: resource-service
  template:
    metadata:
      labels:
        app: resource-service
    spec:
      containers:
        - name: resource-service
          image: resource-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8090
          env:
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://resource-db:5432/resource_db
            - name: SPRING_DATASOURCE_USER
              value: postgres
            - name: SPRING_DATASOURCE_PASSWORD
              value: postgres
            - name: SONG_SERVICE_URL
              value: http://song-service:8091
            - name: EUREKA_CLIENT_ENABLED
              value: "false"