apiVersion: v1
kind: ConfigMap
metadata:
  name: song-db-config
  namespace: k8s-program
data:
  postgres-db: song_db
  init.sql: |
    CREATE TABLE songs
    (
        id BIGINT PRIMARY KEY,
        name VARCHAR(255),
        artist VARCHAR(255),
        album VARCHAR(255),
        genre VARCHAR(255),
        duration VARCHAR(255),
        year VARCHAR(255)
    );