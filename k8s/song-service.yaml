apiVersion: v1
kind: Service
metadata:
  name: song-service
  namespace: k8s-program
spec:
  type: NodePort
  selector:
    app: song-service
  ports:
    - port: 8091
      targetPort: 8091
      nodePort: 30091
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: song-service-pvc
  namespace: k8s-program
spec:
  storageClassName: manual
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: song-service
  namespace: k8s-program
spec:
  replicas: 2
  selector:
    matchLabels:
      app: song-service
  template:
    metadata:
      labels:
        app: song-service
    spec:
      containers:
        - name: song-service
          image: song-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8091
          envFrom:
            - configMapRef:
                name: song-service-config
          env:
            - name: SPRING_DATASOURCE_USER
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: db-username
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: db-password
          volumeMounts:
            - name: song-data
              mountPath: /data/song-service
      volumes:
        - name: song-data
          persistentVolumeClaim:
            claimName: song-service-pvc
