apiVersion: v1
kind: Service
metadata:
  name: song-service
  namespace: k8s-program
spec:
  type: NodePort
  selector:
    app: song-service
  ports:
    - port: 8091
      targetPort: 8091
      nodePort: 30091
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: song-service-pvc
  namespace: k8s-program
spec:
  storageClassName: manual
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: song-service
  namespace: k8s-program
spec:
  replicas: 2
  selector:
    matchLabels:
      app: song-service
  template:
    metadata:
      labels:
        app: song-service
    spec:
      containers:
        - name: song-service
          image: song-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8091
          env:
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://song-db:5432/song_db
            - name: SPRING_DATASOURCE_USER
              value: postgres
            - name: SPRING_DATASOURCE_PASSWORD
              value: postgres
            - name: EUREKA_CLIENT_ENABLED
              value: "false"
          volumeMounts:
            - name: song-data
              mountPath: /data/song-service
      volumes:
        - name: song-data
          persistentVolumeClaim:
            claimName: song-service-pvc
