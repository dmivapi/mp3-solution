server:
  port: 8090
song-service:
  client:
    base-url: "${SONG_SERVICE_URL:http://localhost:8091}"
spring:
  application:
    name: resource-service
  datasource:
    url: "${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/resource_db}"
    username: "${SPRING_DATASOURCE_USER:postgres}"
    password: "${SPRING_DATASOURCE_PASSWORD:postgres}"
  jpa:
    hibernate:
      ddl-auto: none
